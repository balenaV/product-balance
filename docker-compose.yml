services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: product-balance-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: "1"
    depends_on:
      - mysql
      - redis
    networks:
      - product-balance

  nginx:
    image: nginx:1.27-alpine
    container_name: product-balance-nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - product-balance

  mysql:
    image: mysql:8.4
    container_name: product-balance-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: product_balance
      MYSQL_USER: product_balance
      MYSQL_PASSWORD: product_balance
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - product-balance

  redis:
    image: redis:7.4-alpine
    container_name: product-balance-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - product-balance

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: product-balance-reverb
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - redis
    networks:
      - product-balance
    profiles:
      - websocket

volumes:
  mysql-data:
  redis-data:

networks:
  product-balance:
    driver: bridge

